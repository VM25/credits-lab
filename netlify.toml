# Netlify build config. The site lives in frontend/ and is self-contained:
# the data it serves is committed at frontend/public/data/outputs, so the CI
# build is a plain `vite build` with no cross-directory steps.
[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
